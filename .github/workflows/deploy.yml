name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuilds every 30 min so nb sync changes appear without a manual trigger.
    # Trigger immediately: gh workflow run deploy.yml --repo OWNER/REPO
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Quartz config
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout notebook content
        uses: actions/checkout@v6
        with:
          repository: linuxcaffe/preciousfinds.ca
          ref: preciousfinds.ca
          path: content
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx quartz build --directory content

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
